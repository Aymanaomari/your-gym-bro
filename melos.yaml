name: ygb_sdk

packages: 
  - packages/**
  - packages/modules/**
  - apps/**

scripts:
  analyze:
    run: melos exec -- flutter analyze
    description: Run static analysis across the entire codebase.

  test:
    run: melos exec --dir-exists="test" -- flutter test
    description: Run unit tests in all packages that possess a test directory.

commands:
  bootstrap:
    run: melos bootstrap
    description: Install dependencies for all packages and link them together.
  test:
    run: melos exec --dir-exists="test" --fail-fast -- flutter test --no-pub coverage
    description: Run unit tests in all packages that possess a test directory.
  analyze:
    run: melos exec -- flutter analyze
    description: Run `dart analyze` in all packages.
  gen_coverage:
    run: melos exec -- "\$MELOS_ROOT_PATH/scripts/combine_coverage.sh"
    description: Generate code coverage reports for all packages with tests.
  
  


  
